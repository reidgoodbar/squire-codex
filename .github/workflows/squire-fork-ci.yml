name: Squire Fork CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, squire-bridge]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bridge:
    name: Squire bridge checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: codex-rs

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Install nextest
        uses: taiki-e/install-action@nextest

      - name: Check portable Squire bridge paths
        run: |
          test -f vendor/squire/crates/squire-codex-adapter/src/exec_bridge.rs
          test -f vendor/squire/crates/squire-codex-adapter/src/unified_exec_bridge.rs
          test -f vendor/squire/crates/squire-codex-bridge/src/lib.rs
          ! grep -R '"\\.\\./\\.\\./\\.\\./\\.\\./squire/' codex-rs/core/src

      - name: Format core
        working-directory: codex-rs
        run: cargo fmt --check -p codex-core

      - name: Test bridge
        run: just test -p codex-core squire_codex_bridge

      - name: Build CLI
        working-directory: codex-rs
        run: cargo build -p codex-cli --bin codex

      - name: Build required runtime helper
        working-directory: codex-rs
        run: cargo build -p codex-code-mode-host --bin codex-code-mode-host
